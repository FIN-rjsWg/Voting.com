<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Poll — 실시간 설문/투표</title>
<style>
  :root {
    --ink: #1a1d29;
    --paper: #fafaf7;
    --line: #e4e2da;
    --accent: #3454d1;
    --accent-soft: #e8ecfb;
    --good: #1e824c;
    --warn: #c0392b;
    --mono: 'SFMono-Regular', Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.5;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: -0.01em; }
  header h1 span { color: var(--accent); }
  #status { font-family: var(--mono); font-size: 12px; color: #888; }
  #status.on { color: var(--good); }

  main { max-width: 880px; margin: 0 auto; padding: 24px; display: grid; gap: 20px; }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card h2 { font-size: 14px; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.04em; color: #666; }

  input, textarea, button {
    font: inherit;
    border-radius: 6px;
    border: 1px solid var(--line);
    padding: 9px 11px;
  }
  input, textarea { width: 100%; background: var(--paper); }
  button {
    background: var(--ink);
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: opacity .15s;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--accent-soft); color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }

  #authArea .row { margin-bottom: 8px; }
  #whoami { font-family: var(--mono); font-size: 13px; }

  .option-input-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .option-input-row input { flex: 1; }
  .option-input-row button { flex: 0 0 auto; padding: 9px 12px; }

  #pollList { display: grid; gap: 10px; }
  .poll-item {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .poll-item:hover { border-color: var(--accent); }
  .poll-item .q { font-weight: 600; }
  .poll-item .meta { font-size: 12px; color: #888; margin-top: 2px; }

  #pollDetail .options { display: grid; gap: 8px; margin: 12px 0; }
  .option-bar {
    position: relative;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    overflow: hidden;
    cursor: pointer;
    background: var(--paper);
  }
  .option-bar .fill {
    position: absolute;
    inset: 0;
    background: var(--accent-soft);
    width: 0%;
    transition: width .3s ease;
    z-index: 0;
  }
  .option-bar .label { position: relative; z-index: 1; display: flex; justify-content: space-between; font-size: 14px; }
  .option-bar:hover { border-color: var(--accent); }

  #chatLog {
    height: 180px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    background: var(--paper);
    font-size: 13px;
    margin-bottom: 8px;
  }
  #chatLog .msg { margin-bottom: 4px; }
  #chatLog .msg b { color: var(--accent); }
  #chatLog .sys { color: #999; font-style: italic; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .badge.open { background: #e6f4ea; color: var(--good); }
  .badge.closed { background: #fbe9e7; color: var(--warn); }

  .hidden { display: none !important; }
  .hint { font-size: 12px; color: #999; margin-top: 6px; }
</style>
</head>
<body>

<header>
  <h1>Live<span>Poll</span> — 실시간 설문/투표</h1>
  <div id="status">WS 연결 안 됨</div>
</header>

<main>

  <section class="card" id="authArea">
    <h2>1. 회원가입 / 로그인</h2>
    <div id="loginForm">
      <div class="row">
        <input id="username" placeholder="사용자명" />
        <input id="password" type="password" placeholder="비밀번호 (4자 이상)" />
      </div>
      <div class="row">
        <button id="btnSignup" class="secondary">회원가입</button>
        <button id="btnLogin">로그인</button>
      </div>
    </div>
    <div id="whoamiArea" class="hidden">
      <span id="whoami"></span>
      &nbsp;·&nbsp;
      <button id="btnLogout" class="secondary" style="padding:4px 10px;">로그아웃</button>
    </div>
  </section>

  <section class="card hidden" id="createArea">
    <h2>2. 설문 만들기</h2>
    <input id="question" placeholder="질문을 입력하세요 (예: 오늘 점심 뭐 먹지?)" style="margin-bottom:8px;" />
    <div id="optionInputs"></div>
    <button id="btnAddOption" class="secondary" style="margin-bottom:8px;">+ 선택지 추가</button>
    <div class="row">
      <button id="btnCreatePoll">설문 생성</button>
    </div>
  </section>

  <section class="card hidden" id="listArea">
    <h2>3. 설문 목록 (클릭해서 입장)</h2>
    <div id="pollList"></div>
  </section>

  <section class="card hidden" id="pollDetail">
    <h2 id="pollQuestion">-</h2>
    <span id="pollBadge" class="badge open">진행중</span>
    <div class="options" id="optionsArea"></div>
    <div class="row" id="closeRow">
      <button id="btnClose" class="secondary">설문 마감 (생성자만)</button>
    </div>

    <h2 style="margin-top:18px;">실시간 채팅</h2>
    <div id="chatLog"></div>
    <div class="row">
      <input id="chatInput" placeholder="의견을 입력하세요..." />
      <button id="btnSendChat">전송</button>
    </div>
  </section>

</main>

<script>
const API = '';
let token = null, me = null, ws = null, currentPollId = null;

const $ = (id) => document.getElementById(id);

// ---------- Auth ----------
async function signup() {
  const username = $('username').value.trim();
  const password = $('password').value;
  const res = await fetch(`${API}/api/auth/signup`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  alert(res.ok ? `가입 완료: ${data.username}. 이제 로그인하세요.` : `오류: ${data.error}`);
}

async function login() {
  const username = $('username').value.trim();
  const password = $('password').value;
  const res = await fetch(`${API}/api/auth/login`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (!res.ok) return alert(`오류: ${data.error}`);
  token = data.token; me = data.user;
  onLoggedIn();
}

function onLoggedIn() {
  $('loginForm').classList.add('hidden');
  $('whoamiArea').classList.remove('hidden');
  $('whoami').textContent = `👤 ${me.username} 로그인됨`;
  $('createArea').classList.remove('hidden');
  $('listArea').classList.remove('hidden');
  connectWS();
  loadPolls();
}

function logout() {
  token = null; me = null;
  if (ws) ws.close();
  $('loginForm').classList.remove('hidden');
  $('whoamiArea').classList.add('hidden');
  $('createArea').classList.add('hidden');
  $('listArea').classList.add('hidden');
  $('pollDetail').classList.add('hidden');
}

$('btnSignup').onclick = signup;
$('btnLogin').onclick = login;
$('btnLogout').onclick = logout;

// ---------- WebSocket ----------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?token=${token}`);

  ws.onopen = () => { $('status').textContent = 'WS 연결됨'; $('status').classList.add('on'); };
  ws.onclose = () => { $('status').textContent = 'WS 끊김'; $('status').classList.remove('on'); };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'vote_update' && msg.pollId === currentPollId) {
      renderResults(msg.results, msg.total);
    } else if (msg.type === 'chat' && msg.pollId === currentPollId) {
      appendChat(msg.username, msg.message);
    } else if (msg.type === 'poll_closed' && msg.pollId === currentPollId) {
      $('pollBadge').textContent = '마감됨';
      $('pollBadge').className = 'badge closed';
      appendChat(null, '⚠️ 설문이 마감되었습니다.', true);
    }
  };
}

// ---------- Poll Create ----------
let optionCount = 0;
function addOptionInput(value = '') {
  optionCount++;
  const row = document.createElement('div');
  row.className = 'option-input-row';
  row.innerHTML = `<input class="opt-input" placeholder="선택지 ${optionCount}" value="${value}" />`;
  $('optionInputs').appendChild(row);
}
addOptionInput(); addOptionInput();
$('btnAddOption').onclick = () => addOptionInput();

$('btnCreatePoll').onclick = async () => {
  const question = $('question').value.trim();
  const options = [...document.querySelectorAll('.opt-input')].map(i => i.value.trim()).filter(Boolean);
  if (!question || options.length < 2) return alert('질문과 선택지 2개 이상을 입력하세요.');

  const res = await fetch(`${API}/api/polls`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ question, options })
  });
  const data = await res.json();
  if (!res.ok) return alert(`오류: ${data.error}`);

  $('question').value = '';
  document.querySelectorAll('.opt-input').forEach(i => i.value = '');
  loadPolls();
  openPoll(data.id);
};

// ---------- Poll List ----------
async function loadPolls() {
  const res = await fetch(`${API}/api/polls`);
  const polls = await res.json();
  const list = $('pollList');
  list.innerHTML = '';
  if (polls.length === 0) {
    list.innerHTML = '<div class="hint">아직 설문이 없습니다. 위에서 하나 만들어보세요.</div>';
    return;
  }
  polls.slice().reverse().forEach(p => {
    const div = document.createElement('div');
    div.className = 'poll-item';
    div.innerHTML = `<div class="q">${escapeHtml(p.question)}</div>
      <div class="meta">by ${escapeHtml(p.creatorName)} · 총 ${p.total}표 · ${p.isOpen ? '진행중' : '마감'}</div>`;
    div.onclick = () => openPoll(p.id);
    list.appendChild(div);
  });
}

// ---------- Poll Detail ----------
let currentOptions = [];

async function openPoll(pollId) {
  const res = await fetch(`${API}/api/polls/${pollId}`);
  const poll = await res.json();
  currentPollId = pollId;
  currentOptions = poll.options;

  $('pollDetail').classList.remove('hidden');
  $('pollQuestion').textContent = poll.question;
  $('pollBadge').textContent = poll.isOpen ? '진행중' : '마감됨';
  $('pollBadge').className = 'badge ' + (poll.isOpen ? 'open' : 'closed');
  $('btnClose').style.display = (poll.creatorId === me.id && poll.isOpen) ? 'block' : 'none';

  renderOptions(poll.options);
  renderResults(poll.results, poll.total);

  $('chatLog').innerHTML = '';
  const msgRes = await fetch(`${API}/api/polls/${pollId}/messages`);
  const msgs = await msgRes.json();
  msgs.forEach(m => appendChat(m.username, m.message));

  ws.send(JSON.stringify({ type: 'join', pollId }));
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function renderOptions(options) {
  const area = $('optionsArea');
  area.innerHTML = '';
  options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'option-bar';
    div.dataset.idx = idx;
    div.innerHTML = `<div class="fill"></div><div class="label"><span>${escapeHtml(opt)}</span><span class="pct">0%</span></div>`;
    div.onclick = () => vote(idx);
    area.appendChild(div);
  });
}

function renderResults(results, total) {
  const bars = document.querySelectorAll('.option-bar');
  bars.forEach((bar, idx) => {
    const count = results[idx] || 0;
    const pct = total > 0 ? Math.round((count / total) * 100) : 0;
    bar.querySelector('.fill').style.width = pct + '%';
    bar.querySelector('.pct').textContent = `${count}표 (${pct}%)`;
  });
}

async function vote(optionIndex) {
  const res = await fetch(`${API}/api/polls/${currentPollId}/vote`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ optionIndex })
  });
  const data = await res.json();
  if (!res.ok) return alert(`오류: ${data.error}`);
  // 결과는 WebSocket vote_update로 실시간 반영됨
}

$('btnClose').onclick = async () => {
  await fetch(`${API}/api/polls/${currentPollId}/close`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` }
  });
};

// ---------- Chat ----------
function appendChat(username, message, isSystem = false) {
  const log = $('chatLog');
  const div = document.createElement('div');
  div.className = isSystem ? 'msg sys' : 'msg';
  div.innerHTML = isSystem ? escapeHtml(message) : `<b>${escapeHtml(username)}</b>: ${escapeHtml(message)}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

$('btnSendChat').onclick = sendChat;
$('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

function sendChat() {
  const input = $('chatInput');
  const message = input.value.trim();
  if (!message || !currentPollId) return;
  ws.send(JSON.stringify({ type: 'chat', pollId: currentPollId, message }));
  input.value = '';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}
</script>

</body>
</html>
