<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseVote - BPM 기반 실시간 투표</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">
                <span class="pulse-icon">❤️</span> PulseVote
            </h1>
            <div id="auth-controls" class="auth-controls">
                <!-- 로그인 상태에 따라 JS로 채워짐 -->
            </div>
        </header>

        <main>
            <section id="polls-section" class="section">
                <div class="section-header">
                    <h2>진행 중인 투표</h2>
                    <button id="create-poll-btn" class="btn primary glow">새 투표 만들기</button>
                </div>
                <div id="polls-container" class="polls-grid">
                    <!-- 투표 목록이 여기에 렌더링됩니다 -->
                </div>
            </section>

            <section id="detail-section" class="section detail-section hidden">
                <div class="section-header">
                    <h2 id="detail-title">투표 제목</h2>
                    <div class="detail-actions">
                        <span class="poll-stats-inline">
                            총 투표수: <b id="detail-total">0</b> ·
                            <span class="bpm-display">Avg BPM: <b id="detail-bpm" class="glow-text">--</b></span>
                        </span>
                        <button id="close-poll-btn" class="btn danger">투표 마감</button>
                        <button id="back-btn" class="btn ghost">목록으로</button>
                    </div>
                </div>
                <p id="voted-badge" class="voted-badge hidden">✔ 이미 이 투표에 참여하셨습니다.</p>
                <div id="options-container" class="options-list"></div>
            </section>
        </main>
    </div>

    <!-- 투표 생성 모달 -->
    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>새 투표 만들기</h3>
            <label class="field-label">투표 제목</label>
            <input id="poll-title-input" type="text" class="text-input" placeholder="예: 오늘 점심 뭐 먹지?">
            <label class="field-label">선택지</label>
            <div id="options-inputs" class="options-inputs">
                <input type="text" class="text-input option-input" placeholder="선택지 1">
                <input type="text" class="text-input option-input" placeholder="선택지 2">
            </div>
            <button id="add-option-btn" class="btn ghost small">+ 선택지 추가</button>
            <p id="create-error" class="error-text hidden"></p>
            <div class="modal-actions">
                <button id="cancel-create-btn" class="btn ghost">취소</button>
                <button id="submit-create-btn" class="btn primary glow">만들기</button>
            </div>
        </div>
    </div>

    <!-- Socket.io 클라이언트 (실제 서버 환경에서는 동작, 로컬 단독 테스트 시에는 오류를 무시하세요) -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 클라이언트 로직
        const socket = typeof io !== 'undefined' ? io() : { on: () => {}, emit: () => {} };

        // userId / 닉네임
        let currentUserId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('userId', currentUserId);
        let currentNickname = localStorage.getItem('nickname') || null;
        let currentRoom = null;

        // --- 인증 UI ---
        function renderAuth() {
            const el = document.getElementById('auth-controls');
            if (currentNickname) {
                el.innerHTML = `
                    <span class="user-badge">${escapeHtml(currentNickname)}님</span>
                    <button id="logout-btn" class="btn ghost small">로그아웃</button>
                `;
                document.getElementById('logout-btn').onclick = () => {
                    currentNickname = null;
                    localStorage.removeItem('nickname');
                    renderAuth();
                };
            } else {
                el.innerHTML = `<button id="login-btn" class="btn primary small">로그인</button>`;
                document.getElementById('login-btn').onclick = () => {
                    const name = prompt('닉네임을 입력하세요');
                    if (name && name.trim()) {
                        currentNickname = name.trim();
                        localStorage.setItem('nickname', currentNickname);
                        renderAuth();
                    }
                };
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        // 투표 열기(BPM)에 맞춰 하트 아이콘 박동 속도를 조절 (BPM = 총 투표수 반영)
        function applyPulseSpeed(bpm) {
            const pulseIcon = document.querySelector('.pulse-icon');
            if (!pulseIcon) return;
            const beatsPerMinute = Math.min(180, 60 + (bpm || 0) * 4); // 투표가 많을수록 빠르게 박동
            pulseIcon.style.animation = `heartbeat ${(60 / beatsPerMinute).toFixed(2)}s infinite`;
        }

        // --- WebSocket 이벤트 리스너 ---
        socket.on('vote:cast', (data) => {
            updatePollUI(data);
        });

        socket.on('poll:closed', () => {
            alert('현재 보고 계신 투표가 마감되었습니다.');
            loadPolls();
            showList();
        });

        // --- API 호출 및 렌더링 ---
        async function loadPolls() {
            try {
                const res = await fetch('/api/polls');
                const polls = await res.json();
                renderPolls(polls);
            } catch (err) {
                console.error('Failed to load polls', err);
                document.getElementById('polls-container').innerHTML =
                    '<p class="empty-text">서버에 연결할 수 없습니다. (단독 미리보기 모드)</p>';
            }
        }

        function renderPolls(polls) {
            const container = document.getElementById('polls-container');
            if (!polls.length) {
                container.innerHTML = '<p class="empty-text">아직 투표가 없습니다. 새 투표를 만들어보세요!</p>';
                return;
            }
            container.innerHTML = polls.map(poll => `
                <div class="poll-card ${!poll.isOpen ? 'closed' : ''}" data-id="${poll.id}">
                    <div class="poll-status ${poll.isOpen ? 'active' : ''}">
                        ${poll.isOpen ? '진행 중' : '마감됨'}
                    </div>
                    <h3>${escapeHtml(poll.title)}</h3>
                    <div class="poll-stats">
                        <span>총 투표수: <b id="total-${poll.id}">${poll.totalVotes || 0}</b></span>
                        <span class="bpm-display">Avg BPM: <b id="bpm-${poll.id}" class="glow-text">${poll.averageBpm ?? 0}</b></span>
                    </div>
                </div>
            `).join('');
            container.querySelectorAll('.poll-card').forEach(card => {
                card.addEventListener('click', () => joinPoll(card.dataset.id));
            });
        }

        async function joinPoll(pollId) {
            const res = await fetch(`/api/polls/${pollId}?userId=${encodeURIComponent(currentUserId)}`);
            if (!res.ok) return;
            const poll = await res.json();

            if (currentRoom) socket.emit('room:leave', currentRoom);
            currentRoom = pollId;
            socket.emit('room:join', pollId);
            console.log(`Joined poll room: ${pollId}`);

            showDetail(poll);
        }

        function showDetail(poll) {
            document.getElementById('polls-section').classList.add('hidden');
            document.getElementById('detail-section').classList.remove('hidden');
            document.getElementById('detail-title').innerText = poll.title;
            document.getElementById('detail-total').innerText = poll.totalVotes || 0;
            document.getElementById('detail-bpm').innerText = poll.averageBpm ?? 0;
            document.getElementById('close-poll-btn').style.display = poll.isOpen ? '' : 'none';
            document.getElementById('voted-badge').classList.toggle('hidden', !poll.hasVoted);
            applyPulseSpeed(poll.averageBpm);

            const locked = !poll.isOpen || poll.hasVoted;
            const optionsEl = document.getElementById('options-container');
            optionsEl.innerHTML = poll.options.map(o => `
                <button class="option-btn ${locked ? 'disabled' : ''}" data-option="${o.id}" ${locked ? 'disabled' : ''}>
                    <span class="option-label">${escapeHtml(o.label)}</span>
                    <span class="option-votes" id="option-votes-${o.id}">${o.votes}표</span>
                </button>
            `).join('');
            if (!locked) {
                optionsEl.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', () => castVote(btn.dataset.option));
                });
            }
        }

        function showList() {
            document.getElementById('detail-section').classList.add('hidden');
            document.getElementById('polls-section').classList.remove('hidden');
            if (currentRoom) socket.emit('room:leave', currentRoom);
            currentRoom = null;
        }

        async function castVote(optionId) {
            if (!currentRoom) return;
            if (!currentNickname) {
                alert('투표하려면 먼저 로그인해주세요.');
                return;
            }
            try {
                const res = await fetch(`/api/polls/${currentRoom}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ optionId, userId: currentUserId })
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || '투표에 실패했습니다.');
                    return;
                }
                // 서버가 돌려준 최신 상태(중복 투표 잠금 포함)로 즉시 갱신
                showDetail(data);
            } catch (err) {
                console.error('Vote failed', err);
                alert('서버에 연결할 수 없습니다.');
            }
        }

        function updatePollUI(data) {
            // 카드형 목록 갱신
            const totalEl = document.getElementById(`total-${data.pollId}`);
            const bpmEl = document.getElementById(`bpm-${data.pollId}`);
            if (totalEl) totalEl.innerText = data.total;
            if (bpmEl) {
                bpmEl.innerText = data.bpm ?? 0;
                bpmEl.classList.add('pulse-flash');
                setTimeout(() => bpmEl.classList.remove('pulse-flash'), 500);
            }

            // 상세(투표 참여) 화면 갱신
            if (currentRoom === data.pollId) {
                applyPulseSpeed(data.bpm);
                const detailTotal = document.getElementById('detail-total');
                const detailBpm = document.getElementById('detail-bpm');
                if (detailTotal) detailTotal.innerText = data.total;
                if (detailBpm) {
                    detailBpm.innerText = data.bpm ?? 0;
                    detailBpm.classList.add('pulse-flash');
                    setTimeout(() => detailBpm.classList.remove('pulse-flash'), 500);
                }
                if (data.options) {
                    data.options.forEach(o => {
                        const el = document.getElementById(`option-votes-${o.id}`);
                        if (el) el.innerText = `${o.votes}표`;
                    });
                }
            }
        }

        // --- 투표 생성 모달 ---
        function openCreateModal() {
            document.getElementById('poll-title-input').value = '';
            document.getElementById('options-inputs').innerHTML = `
                <input type="text" class="text-input option-input" placeholder="선택지 1">
                <input type="text" class="text-input option-input" placeholder="선택지 2">
            `;
            document.getElementById('create-error').classList.add('hidden');
            document.getElementById('create-modal').classList.remove('hidden');
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
        }

        async function submitCreate() {
            const title = document.getElementById('poll-title-input').value.trim();
            const options = [...document.querySelectorAll('.option-input')]
                .map(i => i.value.trim())
                .filter(Boolean);
            const errorEl = document.getElementById('create-error');

            if (!title || options.length < 2) {
                errorEl.innerText = '제목과 2개 이상의 선택지를 입력해주세요.';
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/api/polls', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, options })
                });
                if (!res.ok) {
                    const err = await res.json();
                    errorEl.innerText = err.error || '투표 생성에 실패했습니다.';
                    errorEl.classList.remove('hidden');
                    return;
                }
                closeCreateModal();
                loadPolls();
            } catch (err) {
                errorEl.innerText = '서버에 연결할 수 없습니다.';
                errorEl.classList.remove('hidden');
            }
        }

        // --- 이벤트 바인딩 ---
        document.getElementById('create-poll-btn').addEventListener('click', openCreateModal);
        document.getElementById('cancel-create-btn').addEventListener('click', closeCreateModal);
        document.getElementById('submit-create-btn').addEventListener('click', submitCreate);
        document.getElementById('add-option-btn').addEventListener('click', () => {
            const wrap = document.getElementById('options-inputs');
            const idx = wrap.querySelectorAll('.option-input').length + 1;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'text-input option-input';
            input.placeholder = `선택지 ${idx}`;
            wrap.appendChild(input);
        });
        document.getElementById('back-btn').addEventListener('click', showList);
        document.getElementById('close-poll-btn').addEventListener('click', async () => {
            if (!currentRoom) return;
            if (!confirm('이 투표를 마감할까요?')) return;
            await fetch(`/api/polls/${currentRoom}/close`, { method: 'POST' });
        });

        // 초기화
        renderAuth();
        loadPolls();
    </script>
</body>
</html>
